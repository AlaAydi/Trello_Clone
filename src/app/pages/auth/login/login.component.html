<div class="flex h-screen w-full bg-[#f8fafc] font-sans selection:bg-blue-100">

  <div class="flex w-full flex-col justify-between bg-white p-8 md:w-1/2 lg:p-16">
    <!-- Logo -->
   <div class="logo">
      <div class="logo-placeholder">
        <svg viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#2563eb"/>
          <rect x="7" y="7" width="8" height="11" rx="2" fill="white"/>
          <rect x="17" y="7" width="8" height="6" rx="2" fill="rgba(255,255,255,0.6)"/>
          <rect x="17" y="15" width="8" height="10" rx="2" fill="white"/>
          <rect x="7" y="20" width="8" height="5" rx="2" fill="rgba(255,255,255,0.6)"/>
        </svg>
        TaskFlow
      </div>
    </div>

    <!-- Form Container -->
    <div class="mx-auto flex w-full max-w-sm flex-col justify-center">
      <div class="mb-10 text-left">
        <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Log in</h1>
        <p class="mt-2 text-slate-500">Welcome back! Please enter your details.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div *ngIf="errorMessage" class="rounded-xl bg-red-50 p-4 text-sm text-red-600 border border-red-100 flex items-center gap-2">
           <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
           {{ errorMessage }}
        </div>

        <div class="space-y-1">
          <label class="text-sm font-semibold text-slate-700 ml-1">Email</label>
          <div class="relative">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
              <svg class="h-5 w-5 text-slate-400" [class.text-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input 
              type="email" 
              formControlName="email"
              placeholder="name@company.com" 
              class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 py-3.5 pl-11 pr-4 text-slate-900 placeholder-slate-400 transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-600/10"
              [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            />
          </div>
          <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="mt-1 text-xs text-red-500 ml-1">
            Please enter a valid email address.
          </p>
        </div>

        <div class="space-y-1">
          <label class="text-sm font-semibold text-slate-700 ml-1">Password</label>
          <div class="relative">
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
              <svg class="h-5 w-5 text-slate-400" [class.text-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input 
              type="password" 
              formControlName="password"
              placeholder="••••••••" 
              class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 py-3.5 pl-11 pr-4 text-slate-900 placeholder-slate-400 transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-600/10"
              [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            />
          </div>
          <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="mt-1 text-xs text-red-500 ml-1">
            Password must be at least 6 characters.
          </p>
        </div>

        <button 
          type="submit" 
          [disabled]="loading"
          class="flex w-full items-center justify-center rounded-xl bg-blue-600 py-4 font-bold text-white shadow-xl shadow-blue-600/20 transition-all hover:bg-blue-700 hover:shadow-blue-600/30 active:scale-[0.99] disabled:opacity-70 disabled:cursor-not-allowed"
        >
          <svg *ngIf="loading" class="mr-3 h-5 w-5 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>

        <div class="text-center">
          <a href="#" class="text-sm font-bold text-blue-600 hover:text-blue-700">Forgot password?</a>
        </div>
      </form>

      <!-- Divider -->
      <div class="my-10 flex items-center gap-4">
        <div class="h-px flex-1 bg-slate-100"></div>
        <span class="text-xs font-bold uppercase tracking-widest text-slate-400">or continue with</span>
        <div class="h-px flex-1 bg-slate-100"></div>
      </div>

      <!-- Social Logins -->
      <div class="grid grid-cols-2 gap-4">
        <button class="flex items-center justify-center gap-3 rounded-xl border border-slate-200 bg-white py-3 px-4 text-sm font-bold text-slate-700 transition-all hover:bg-slate-50 hover:border-slate-300">
          <svg class="h-5 w-5" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115z" />
            <path fill="#34A853" d="M16.04 18.013c-1.09.463-2.317.764-3.565.764-1.627 0-3.136-.554-4.282-1.482L4.09 20.449C6.182 22.42 8.945 23.591 12 23.591c4.882 0 9.032-3.232 10.49-7.75l-4.05-3.136c-.545 2.155-2.204 3.864-4.4 5.308z" />
            <path fill="#4285F4" d="M23.523 12.25c0-.825-.075-1.617-.214-2.386H12v4.51h6.463c-.278 1.491-1.127 2.76-2.423 3.639l4.05 3.136c2.373-2.181 3.733-5.386 3.733-8.899z" />
            <path fill="#FBBC05" d="M5.266 9.765l-4.026-3.115C.454 8.24 0 9.941 0 11.75c0 1.81.454 3.51 1.24 5.082l4.132-3.218A7.087 7.087 0 0 1 5.266 9.765z" />
          </svg>
          Google
        </button>
        <button class="flex items-center justify-center gap-3 rounded-xl border border-slate-200 bg-white py-3 px-4 text-sm font-bold text-slate-700 transition-all hover:bg-slate-50 hover:border-slate-300">
          <svg class="h-5 w-5 fill-blue-600" viewBox="0 0 24 24">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.791-4.667 4.53-4.667 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
          </svg>
          Facebook
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center text-sm text-slate-500">
      Don't have an account? <a routerLink="/registre" class="font-bold text-blue-600 hover:text-blue-700">Sign Up</a>
    </div>
  </div>

  <!-- Right Side: Visual Preview -->
  <div class="hidden w-1/2 flex-col items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-700 p-12 text-white md:flex lg:p-24">
    <div class="relative w-full max-w-lg text-center font-sans">
      <div class="mb-10 flex justify-center drop-shadow-2xl">
        <lottie-player 
          src="../../../../assets/work managemnt.json" 
          background="transparent" 
          speed="1" 
          loop 
          autoplay
        ></lottie-player>
      </div>

      <h2 class="mb-6 text-4xl font-extrabold leading-tight lg:text-5xl" >
        Welcome back!
      </h2>
      <p class="text-xl font-medium opacity-90">
        Access your boards and resume your work in seconds.
      </p>

 
    </div>
  </div>
</div>
